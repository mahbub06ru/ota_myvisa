  <span class="hamburger-bar"></span>
  <span class="hamburger-bar"></span>
  <span class="hamburger-bar"></span>
</button>
</div>

<script>
(function initNavigation() {
  var navToggle = document.getElementById("nav-toggle");
  var nav = document.getElementById("main-nav");

  if (navToggle && nav) {
    // Remove existing listeners to prevent duplicates if script runs multiple times
    var newNavToggle = navToggle.cloneNode(true);
    navToggle.parentNode.replaceChild(newNavToggle, navToggle);
    navToggle = newNavToggle;

    navToggle.addEventListener("click", function(e) {
      e.preventDefault();
      e.stopPropagation();
      var isOpen = nav.classList.toggle("open");
      navToggle.setAttribute("aria-expanded", isOpen);
      nav.querySelectorAll(".nav-dropdown").forEach(function(d) { d.classList.remove("active"); });
      if (isOpen) {
        document.body.classList.add("nav-open");
      } else {
        document.body.classList.remove("nav-open");
      }
    });

    window.addEventListener("resize", function() {
      if (window.innerWidth > 768 && nav.classList.contains("open")) {
        nav.classList.remove("open");
        navToggle.setAttribute("aria-expanded", "false");
        document.body.classList.remove("nav-open");
      }
    });

    document.addEventListener("click", function(e) {
      if (!nav.classList.contains("open")) return;
      if (!nav.contains(e.target) && !navToggle.contains(e.target)) {
        nav.classList.remove("open");
        navToggle.setAttribute("aria-expanded", "false");
        document.body.classList.remove("nav-open");
      }
    });

    if (!window._navLinkCloseHandler) {
      window._navLinkCloseHandler = function(e) {
        if (window.innerWidth > 768) return;
        var nav = document.getElementById("main-nav");
        if (!nav || !nav.classList.contains("open")) return;
        if (e.target.closest(".dropdown-toggle") || e.target.closest(".dropdown-menu")) return;
        var clickedLink = e.target.closest("a");
        if (clickedLink && !clickedLink.classList.contains("dropdown-toggle") && clickedLink.closest(".nav")) {
          nav.classList.remove("open");
          var toggle = document.getElementById("nav-toggle");
          if (toggle) toggle.setAttribute("aria-expanded", "false");
          document.body.classList.remove("nav-open");
        }
      };
      document.addEventListener("click", window._navLinkCloseHandler, false);
    }
  }

  if (!window._dropdownToggleHandler) {
    window._dropdownToggleHandler = function(e) {
      if (window.innerWidth > 768) return;
      var nav = document.getElementById("main-nav");
      if (!nav || !nav.classList.contains("open")) return;
      var dropdownToggle = e.target.closest(".dropdown-toggle");
      if (!dropdownToggle) return;
      var dropdown = dropdownToggle.closest(".nav-dropdown");
      if (!dropdown) return;
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      var isActive = dropdown.classList.contains("active");
      nav.querySelectorAll(".nav-dropdown").forEach(function(d) { if (d !== dropdown) d.classList.remove("active"); });
      dropdown.classList.toggle("active", !isActive);
      return false;
    };
  }

  document.removeEventListener("click", window._dropdownToggleHandler, true);
  document.addEventListener("click", window._dropdownToggleHandler, true);

  if (nav) {
    nav.querySelectorAll(".dropdown-menu a").forEach(function(link) {
      link.addEventListener("click", function() {
        if (window.innerWidth <= 768) {
          var n = document.getElementById("main-nav");
          var t = document.getElementById("nav-toggle");
          if (n) { n.classList.remove("open"); if (t) t.setAttribute("aria-expanded", "false"); }
          document.body.classList.remove("nav-open");
        }
      });
    });
  }

  var currentPath = window.location.pathname;
  document.querySelectorAll(".nav a[data-page]").forEach(function(link) {
    var linkPath = new URL(link.href, window.location.origin).pathname;
    if (currentPath.includes(linkPath) ||
        (link.getAttribute("data-page") === "home" && (currentPath === "/" || currentPath.endsWith("index.html")))) {
      link.classList.add("active");
    }
  });
})();
</script>
